<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
 <link rel="stylesheet" href="Login.css">
<title>Login Administrador</title>
</head>

<body>

<div class="login-container">

<img
src="Logo_Modelo.jpg" 
alt="Logo"
class="logo">

<h1>Consumibles EZ</h1>

<p class="subtitulo">
Panel de Administración
</p>

<input
type="email"
id="correo"
placeholder="Correo">

<input
type="password"
id="password"
placeholder="Contraseña">

<button id="loginBtn">
Entrar
</button>

<script type="module">

import {
 auth,
 signInWithEmailAndPassword
} from "./firebase.js";

document
.getElementById("loginBtn")
.addEventListener("click", async ()=>{

 const correo =
 document.getElementById("correo").value;

 const password =
 document.getElementById("password").value;

 try{

   await signInWithEmailAndPassword(
      auth,
      correo,
      password
   );

   window.location.href =
   "admin.html";

 }catch(error){

   alert(
      "Usuario o contraseña incorrectos"
   );

 }

});

</script>
 
</div>
</script>

</body>
</html>
