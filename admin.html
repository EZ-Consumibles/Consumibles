<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Panel Administrador</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h1>Panel Administrador</h1>

<button id="logoutBtn">
Cerrar sesión
</button>

<hr>

<h2>Agregar Producto</h2>

<input id="Nombre" placeholder="Nombre">

<select id="Categoria">
    <option>Papeleria</option>
    <option>Limpieza</option>
    <option>EPP</option>
    <option>Lubricantes</option>
    <option>Productivo</option>
</select>

<input id="sku" placeholder="SKU">

<input id="ceco" placeholder="CeCo">

<input id="cuenta" placeholder="Cuenta">

<input id="imagen" placeholder="Imagen">

<button id="guardarBtn">
Guardar Producto
</button>

<hr>

<h2>Importar Excel</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button id="importarBtn">
Importar Excel
</button>

<h2>Productos Registrados</h2>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Categoria</th>
<th>SKU</th>
<th>Eliminar</th>
</tr>
</thead>

<tbody id="tablaProductos">

</tbody>

</table>

<script type="module">

    document
.getElementById("importarBtn")
.addEventListener("click", async ()=>{

 const archivo =
 document.getElementById("excelFile").files[0];

 if(!archivo){

   alert("Selecciona un archivo Excel");

   return;
 }

 const reader = new FileReader();

 reader.onload = async (e)=>{

   const data =
   new Uint8Array(e.target.result);

   const workbook =
   XLSX.read(data,{type:"array"});

   const hoja =
   workbook.Sheets[
     workbook.SheetNames[0]
   ];

   const productos =
   XLSX.utils.sheet_to_json(hoja);

   let contador = 0;

   for(const p of productos){

      await addDoc(
         collection(db,"productos"),
         {
            Nombre: p.Nombre || "",
            Categoria: p.Categoria || "",
            sku: p.sku || "",
            ceco: p.ceco || "",
            cuenta: p.cuenta || "",
            imagen: p.imagen || ""
         }
      );

      contador++;

   }

   alert(
      contador +
      " productos importados"
   );

   cargarProductos();

 };

 reader.readAsArrayBuffer(
   archivo
 );

});
    
import {
 auth,
 db,
 signOut,
 onAuthStateChanged,
 collection,
 addDoc,
 getDocs
}
from "./firebase.js";

onAuthStateChanged(auth,(user)=>{

 if(!user){
   window.location.href="login.html";
 }

});

document
.getElementById("logoutBtn")
.addEventListener("click",async()=>{

 await signOut(auth);

});

async function cargarProductos(){

 const tabla =
 document.getElementById("tablaProductos");

 tabla.innerHTML="";

 const snapshot =
 await getDocs(
   collection(db,"productos")
 );

 snapshot.forEach((doc)=>{

   const p = doc.data();

   tabla.innerHTML += `
   <tr>
      <td>${p.Nombre}</td>
      <td>${p.Categoria}</td>
      <td>${p.sku}</td>
      <td>Próximamente</td>
   </tr>
   `;

 });

}

document
.getElementById("guardarBtn")
.addEventListener("click",async()=>{

 const Nombre =
 document.getElementById("Nombre").value;

 const Categoria =
 document.getElementById("Categoria").value;

 const sku =
 document.getElementById("sku").value;

 const ceco =
 document.getElementById("ceco").value;

 const cuenta =
 document.getElementById("cuenta").value;

 const imagen =
 document.getElementById("imagen").value;

 await addDoc(
   collection(db,"productos"),
   {
      Nombre,
      Categoria,
      sku,
      ceco,
      cuenta,
      imagen
   }
 );

 alert("Producto guardado");

 cargarProductos();

});

cargarProductos();

</script>

</body>
</html>
