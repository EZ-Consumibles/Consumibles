<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
    <link rel="stylesheet" href="admin.css">
<title>Panel Administrador</title>


<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h1>Panel Administrador</h1>

<button id="logoutBtn">
Cerrar sesión
</button>

<hr>

<h2>Agregar Producto</h2>

<input id="Nombre" placeholder="Nombre">

<select id="Categoria">
    <option>Papeleria</option>
    <option>Limpieza</option>
    <option>EPP</option>
    <option>Lubricantes</option>
    <option>Productivo</option>
</select>

<input id="sku" placeholder="SKU">

<input id="ceco" placeholder="CeCo">

<input id="cuenta" placeholder="Cuenta">

<input id="imagen" placeholder="Imagen">

<button id="guardarBtn">
Guardar Producto
</button>

<hr>

<h2>Importar Excel</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button id="importarBtn">
Importar Excel
</button>

<input
type="text"
id="buscarProducto"
placeholder="Buscar por nombre, SKU o categoría...">

<div id="estadisticas">

<div class="card">
📦 Total: <span id="totalProductos">0</span>
</div>

<div class="card">
📚 Papelería:
<span id="totalPapeleria">0</span>
</div>

<div class="card">
🧹 Limpieza:
<span id="totalLimpieza">0</span>
</div>

<div class="card">
🦺 EPP:
<span id="totalEPP">0</span>
</div>

<div class="card">
⚙️ Productivo:
<span id="totalProductivo">0</span>
</div>

<div class="card">
🛢️ Lubricantes:
<span id="totalLubricantes">0</span>
</div>

</div>
    
<h2>Productos Registrados</h2>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Categoria</th>
<th>SKU</th>
<th>Editar</th>
<th>Eliminar</th>
</tr>
</thead>

<tbody id="tablaProductos">

</tbody>

</table>

<script type="module">

import {
 auth,
 db,
 signOut,
 onAuthStateChanged,
 collection,
 addDoc,
 getDocs,
 doc,
 deleteDoc,
 updateDoc
}
from "./firebase.js";

// Verificar sesión
onAuthStateChanged(auth,(user)=>{

 if(!user){
   window.location.href="login.html";
 }

});

// Cerrar sesión
document
.getElementById("logoutBtn")
.addEventListener("click",async()=>{

 await signOut(auth);

});

// Importar Excel
document
.getElementById("importarBtn")
.addEventListener("click", async ()=>{

 const archivo =
 document.getElementById("excelFile").files[0];

 if(!archivo){

   alert("Selecciona un archivo Excel");

   return;

 }

 const reader = new FileReader();

 reader.onload = async (e)=>{

   const data =
   new Uint8Array(e.target.result);

   const workbook =
   XLSX.read(data,{type:"array"});

   const hoja =
   workbook.Sheets[
      workbook.SheetNames[0]
   ];

   const productos =
   XLSX.utils.sheet_to_json(hoja);

   let contador = 0;

   for(const p of productos){

      await addDoc(
         collection(db,"productos"),
         {
            Nombre: p.Nombre || "",
            Categoria: p.Categoria || "",
            sku: p.sku || "",
            ceco: p.ceco || "",
            cuenta: p.cuenta || "",
            imagen: p.imagen || ""
         }
      );

      contador++;

   }

   alert(
      contador +
      " productos importados"
   );

   cargarProductos();

 };

 reader.readAsArrayBuffer(
   archivo
 );

});

// Mostrar productos
async function cargarProductos(){

 const tabla =
 document.getElementById(
   "tablaProductos"
 );

 tabla.innerHTML = "";

    let total = 0;
let papeleria = 0;
let limpieza = 0;
let epp = 0;
let productivo = 0;
let lubricantes = 0;

 const snapshot =
 await getDocs(
   collection(db,"productos")
 );

 snapshot.forEach((documento)=>{

     document.getElementById(
"totalProductos"
).textContent = total;

document.getElementById(
"totalPapeleria"
).textContent = papeleria;

document.getElementById(
"totalLimpieza"
).textContent = limpieza;

document.getElementById(
"totalEPP"
).textContent = epp;

document.getElementById(
"totalProductivo"
).textContent = productivo;

document.getElementById(
"totalLubricantes"
).textContent = lubricantes;

   const p =documento.data();

     total++;

if(p.Categoria === "Papelería") papeleria++;
if(p.Categoria === "Limpieza") limpieza++;
if(p.Categoria === "EPP") epp++;
if(p.Categoria === "Productivo") productivo++;
if(p.Categoria === "Lubricantes") lubricantes++;

   tabla.innerHTML += `
   <tr>

      <td>${p.Nombre || ""}</td>

      <td>${p.Categoria || ""}</td>

      <td>${p.sku || ""}</td>

      <td>
         <button
         onclick="editarProducto('${documento.id}')">
         ✏️ Editar
         </button>
      </td>

      <td>
         <button
         onclick="eliminarProducto('${documento.id}')">
         🗑️ Eliminar
         </button>
      </td>

   </tr>
   `;

 });

}

// Guardar producto
document
.getElementById("guardarBtn")
.addEventListener("click",async()=>{

 const Nombre =
 document.getElementById("Nombre").value;

 const Categoria =
 document.getElementById("Categoria").value;

 const sku =
 document.getElementById("sku").value;

 const ceco =
 document.getElementById("ceco").value;

 const cuenta =
 document.getElementById("cuenta").value;

 const imagen =
 document.getElementById("imagen").value;

 await addDoc(
   collection(db,"productos"),
   {
      Nombre,
      Categoria,
      sku,
      ceco,
      cuenta,
      imagen
   }
 );

 alert("Producto guardado");

 document.getElementById("Nombre").value="";
 document.getElementById("sku").value="";
 document.getElementById("ceco").value="";
 document.getElementById("cuenta").value="";
 document.getElementById("imagen").value="";

 cargarProductos();

});

// Eliminar producto
window.eliminarProducto =
async function(id){

 const confirmar =
 confirm(
   "¿Deseas eliminar este producto?"
 );

 if(!confirmar){
   return;
 }

 await deleteDoc(
   doc(db,"productos",id)
 );

 alert(
   "Producto eliminado"
 );

 cargarProductos();

};
let productoEditando = null;
// Editar producto
window.editarProducto =
async function(id){

 productoEditando = id;

 const snapshot =
 await getDocs(
   collection(db,"productos")
 );

 snapshot.forEach((documento)=>{

   if(documento.id === id){

      const p = documento.data();

      document.getElementById(
         "editNombre"
      ).value = p.Nombre || "";

      document.getElementById(
         "editCategoria"
      ).value = p.Categoria || "";

      document.getElementById(
         "editSku"
      ).value = p.sku || "";

      document.getElementById(
         "editCeco"
      ).value = p.ceco || "";

      document.getElementById(
         "editCuenta"
      ).value = p.cuenta || "";

      document.getElementById(
         "editImagen"
      ).value = p.imagen || "";

   }

 });

 document.getElementById(
   "modalEditar"
 ).style.display = "block";

};

// Buscador
document
.getElementById("buscarProducto")
.addEventListener("keyup",()=>{

 const filtro =
 document
 .getElementById("buscarProducto")
 .value
 .toLowerCase();

 const filas =
 document
 .querySelectorAll(
   "#tablaProductos tr"
 );

 filas.forEach((fila)=>{

   const texto =
   fila.textContent
   .toLowerCase();

   fila.style.display =
   texto.includes(filtro)
   ? ""
   : "none";

 });

});

// Cargar productos al abrir
cargarProductos();

window.cerrarModal = function(){

 document.getElementById(
   "modalEditar"
 ).style.display = "none";

};

document
.getElementById("guardarEdicionBtn")
.addEventListener("click", async ()=>{

 // código guardar

});
    
</script>

<div id="modalEditar" style="display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);">

<div style="
background:white;
width:400px;
max-width:90%;
padding:20px;
margin:50px auto;
border-radius:10px;">

<h2>Editar Producto</h2>

<input id="editNombre" placeholder="Nombre">

<select id="editCategoria">
  <option>Papeleria</option>
  <option>Limpieza</option>
  <option>EPP</option>
  <option>Lubricantes</option>
  <option>Productivo</option>
</select>

<input id="editSku" placeholder="SKU">

<input id="editCeco" placeholder="CeCo">

<input id="editCuenta" placeholder="Cuenta">

<input id="editImagen" placeholder="Imagen">

<br><br>

<button id="guardarEdicionBtn">
Guardar Cambios
</button>

<button onclick="cerrarModal()">
Cancelar
</button>

</div>
</div>
    
</body>
</html>
